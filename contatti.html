<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatti | LaFioreriaDiAnna</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { sage: '#768875', cream: '#fcfaf4', accent: '#b58d67' },
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="font-sans text-stone-800 bg-cream">
    <header class="sticky top-0 z-50 bg-[#fcfaf4]/80 backdrop-blur-md border-b border-sage/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-20">
            <a href="index.html" class="flex flex-col text-sage">
                <span class="font-serif text-2xl tracking-tighter leading-none">LaFioreriaDiAnna</span>
            </a>
            <nav class="hidden md:flex space-x-8">
                <a href="prodotti.html" class="text-stone-600 hover:text-sage font-medium text-sm transition-colors">Fiori</a>
                <a href="idee-regalo.html" class="text-stone-600 hover:text-sage font-medium text-sm transition-colors">Idee Regalo</a>
                <a href="servizi.html" class="text-stone-600 hover:text-sage font-medium text-sm transition-colors">Servizi</a>
                <a href="cura-piante.html" class="text-stone-600 hover:text-sage font-medium text-sm transition-colors">Cura Piante</a>
                <a href="chi-siamo.html" class="text-stone-600 hover:text-sage font-medium text-sm transition-colors">Chi Siamo</a>
            </nav>
            <div class="flex items-center space-x-5">
                <a href="contatti.html" class="bg-sage text-white px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-accent transition-colors">Contattaci</a>
                <button id="mobile-menu-button" class="md:hidden"><i data-lucide="menu"></i></button>
            </div>
        </div>
    </header>

    <main class="pb-20">
        <section class="bg-sage py-32 text-center text-cream">
            <h1 class="font-serif text-5xl md:text-7xl">Contatti</h1>
            <p class="mt-6 opacity-80 text-lg">Siamo nel centro storico di Susa, pronti ad accoglierti.</p>
        </section>

        <section class="max-w-7xl mx-auto px-4 -mt-16">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="space-y-4">
                    <div class="bg-white p-8 rounded-[2rem] shadow-xl flex items-start space-x-4 border border-stone-100">
                        <div class="p-3 bg-sage/10 text-sage rounded-xl"><i data-lucide="map-pin"></i></div>
                        <div>
                            <h4 class="font-serif text-xl mb-1">Indirizzo</h4>
                            <p class="text-stone-500 text-sm">La Fioreria di Anna Berto<br>Via Mazzini, 28, 10059 Susa (TO)</p>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-xl flex items-start space-x-4 border border-stone-100">
                        <div class="p-3 bg-sage/10 text-sage rounded-xl"><i data-lucide="phone"></i></div>
                        <div>
                            <h4 class="font-serif text-xl mb-1">Telefono/Fax</h4>
                            <p class="text-stone-500 text-sm">0122 32469</p>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-xl flex items-start space-x-4 border border-stone-100">
                        <div class="p-3 bg-sage/10 text-sage rounded-xl"><i data-lucide="mail"></i></div>
                        <div>
                            <h4 class="font-serif text-xl mb-1">Email</h4>
                            <p class="text-stone-500 text-sm">info@LaFioreriadiAnna.it</p>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <form action="mailto:info@LaFioreriadiAnna.it" method="post" enctype="text/plain" class="bg-white p-12 rounded-[2.5rem] shadow-xl space-y-6">
                        <h3 class="font-serif text-3xl mb-8">Invia un messaggio</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input type="text" name="Nome" placeholder="Nome" class="border-b-2 py-3 focus:outline-none focus:border-sage">
                            <input type="email" name="Email" placeholder="Email" class="border-b-2 py-3 focus:outline-none focus:border-sage">
                        </div>
                        <textarea name="Messaggio" placeholder="Il tuo messaggio" rows="4" class="w-full border-b-2 py-3 focus:outline-none focus:border-sage"></textarea>
                        <button type="submit" class="bg-sage text-white px-10 py-4 rounded-full font-bold hover:bg-accent transition-colors">Invia Richiesta</button>
                    </form>
                </div>
            </div>
        </section>

        <!-- Mappa -->
        <section class="max-w-7xl mx-auto px-4 py-24">
            <div class="h-[500px] rounded-[3rem] overflow-hidden shadow-2xl border-8 border-white">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2812.564560416!2d7.042571277154238!3d45.13511877107056!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4789ab58380e2f5b%3A0xe5a3c0c0e1b6f0e!2sVia%20Giuseppe%20Mazzini%2C%2028%2C%2010059%20Susa%20TO!5e0!3m2!1sit!2sit!4v1715967000000!5m2!1sit!2sit" 
                    class="w-full h-full border-0" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
